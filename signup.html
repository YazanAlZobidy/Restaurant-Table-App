<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>VIP Restaurant Booking - Signup</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <script>
        function showSeatPlan() {
            var plan;
            var choice;

            choice = document.getElementById("seatChoice").value;
            plan = document.getElementById("seatPlan");

            switch (choice) {
                case "indoor":
                    plan.innerHTML = "Indoor seating is recommended for a quiet dining experience.";
                    break;
                case "outdoor":
                    plan.innerHTML = "Outdoor seating is recommended for fresh air and family groups.";
                    break;
                default:
                    plan.innerHTML = "Choose a seating plan to view the recommendation.";
            }
        }
    </script>
</head>
<body>
    <header>
        <h1>VIP Restaurant Booking</h1>
    </header>

    <nav>
        <a href="Home.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Signup</a>
        <a href="about.html">About</a>
    </nav>

    <section class="card">
        <h2 style="text-align:center;">Signup</h2>
        <img class="page-image" src="loginphoto.jpeg" alt="Signup page image" usemap="#signup-map">
        <map name="signup-map">
            <area shape="rect" coords="0,0,360,260" href="about.html" alt="About our project">
        </map>

        <div id="signupBox" class="form-box" onmouseover="changeBoxColor('signupBox', '#fff9f3')" onmouseout="changeBoxColor('signupBox', 'white')">
            <form onsubmit="return validateSignupForm();">
                <label for="signupName">Full Name</label>
                <input id="signupName" type="text" placeholder="Enter full name">

                <label for="signupEmail">Email</label>
                <input id="signupEmail" type="email" placeholder="Enter email">

                <label for="signupPassword">Password</label>
                <input id="signupPassword" type="password" placeholder="Enter password">

                <label for="signupAge">Age</label>
                <input id="signupAge" type="number" placeholder="Enter age">

                <label for="seatChoice">Preferred Seating</label>
                <select id="seatChoice" onchange="showSeatPlan()">
                    <option value="">Select seating</option>
                    <option value="indoor">Indoor</option>
                    <option value="outdoor">Outdoor</option>
                </select>

                <p id="seatPlan" class="inline-note">Choose a seating plan to view the recommendation.</p>

                <input type="submit" value="Sign Up">
            </form>
        </div>
    </section>

    <footer>
        <p>VIP Restaurant Booking System 2026</p>
    </footer>
</body>
</html>
