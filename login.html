<!DOCTYPE html>
<html>
<head>
    <title>Login-Restaurant Table Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2 style="text-align:center;">Login</h2>
    <div style="
        width: 300px;
        margin: 100px auto;
        padding: 20px;
        background: #1a1a1a;
        border-radius: 10px;
        border: 1px solid #ffce63;
        box-shadow: 0 5px 15px rgba(0,0,0,0.6);
    ">
    
        <form>

            <label>Username </label><input type="text" placeholder="Username" autofocus>
            <br>
            <br>
            <label>Password </label><input type="password" placeholder="Password" autofocus>
            <br>
            <br>
            <input type="submit" value="Login">
            <p>Don't have an account?</p>
            <a href="signup.html" style="color:gold;">Register</a>

        </form>
    </div>

</body>
</html>
